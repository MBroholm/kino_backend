name: push-to-main.yml

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify -B

  build-and-push-image:
    needs: build-and-test

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Normalize repository owner to lowercase for GHCR
      - name: Normalize owner to lowercase
        id: owner
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/kino_backend:latest
            ghcr.io/${{ steps.owner.outputs.value }}/kino_backend:${{ github.sha }}

  deploy:
    needs: [build-and-push-image]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/todo-app

            # Pull the latest images
            docker compose -f docker-compose.prod.yml pull

            # Restart with the new images
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f
