
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kino_db
      MYSQL_USER: jens
      MYSQL_PASSWORD: ${DB_PASSWORD:-x}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-x}
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysqldata:/var/lib/mysql

  app:
    image: ghcr.io/ek-barhjamagmik/kino_backend:latest
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/kino_db
      DATABASE_USERNAME: jens
      DATABASE_PASSWORD: ${DB_PASSWORD:-x}
    depends_on:
      - db

  frontend:
    image: ghcr.io/ek-barhjamagmik/kino_frontend:latest
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mysqldata:
